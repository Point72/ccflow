  Q11:
    _target_: ccflow.examples.tpch.TPCHQuery
    query_id: 11
    inputs: [/table/nation, /table/partsupp, /table/supplier]
  Q12:
    _target_: ccflow.examples.tpch.TPCHQuery
    query_id: 12
    inputs: [/table/lineitem, /table/orders]
  Q13:
