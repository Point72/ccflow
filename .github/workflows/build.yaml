name: Build Status

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - LICENSE
      - README.md
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - '3.11'
          - '3.14'
        dependencies:
          - ''
          - '"pydantic<2.12"'
          - '"pandas<2" "numpy<2" "xarray<2025.09.0" "dask<2024.7.0"'
          - '"pandas<3"'
          - '"pandas<4"'
        exclude:
          # pandas<2 and pydantic<2.12 do not support Python 3.14
          - python-version: '3.14'
            dependencies: '"pydantic<2.12"'
          - python-version: '3.14'
            dependencies: '"pandas<2" "numpy<2" "xarray<2025.09.0" "dask<2024.7.0"'

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: actions-ext/python/setup@main
      with:
        version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: make develop

    - name: Install dependency regression sets
      run: uv pip install -U ${{ matrix.dependencies }}
      if: matrix.dependencies != ''

    - name: Lint
      run: make lint

    - name: Checks
      run: make checks

    - name: Build
      run: make build

    - name: Test
      run: make coverage

    - name: Upload test results (Python)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: py-test-results-${{ matrix.os }}-${{ matrix.python-version }}-
        path: junit.xml
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.dependencies == '' }}

    - name: Publish Unit Test Results
      uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
      with:
        files: '**/junit.xml'
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.dependencies == '' }}

    - name: Upload coverage
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.dependencies == '' }}

    - name: Twine check
      run: make dist

    - uses: actions-ext/python/test-wheel@main
      with:
        module: ccflow

    - uses: actions-ext/python/test-sdist@main
      with:
        module: ccflow

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dist-${{matrix.os}}
        path: dist
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.dependencies == '' }}
